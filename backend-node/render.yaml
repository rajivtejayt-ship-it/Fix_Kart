services:
  # Node.js Web Service (Native Runtime - NO DOCKER)
  - type: web
    name: fixkart-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run db:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fixkart-db
          property: connectionString
    healthCheckPath: /

databases:
  # PostgreSQL Database
  - name: fixkart-db
    databaseName: fixkart
    plan: free
    region: oregon
